<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Factory by Orchestrator</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        :root {
            --bg: #fafafa;
            --surface: #ffffff;
            --primary: #000000;
            --text: #09090b;
            --text-muted: #71717a;
            --border: #e4e4e7;
        }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 600px;
            padding: 2rem;
            text-align: center;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            font-weight: 600;
            letter-spacing: -0.05em;
        }
        p {
            color: var(--text-muted);
            margin-bottom: 2rem;
        }
        .input-group {
            position: relative;
            width: 100%;
            display: flex;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03);
            border-radius: 0.75rem;
        }
        input[type="text"] {
            width: 100%;
            padding: 1rem 1.5rem;
            font-size: 1.1rem;
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus {
            border-color: var(--primary);
        }
        button {
            position: absolute;
            right: 0.5rem;
            top: 0.5rem;
            bottom: 0.5rem;
            background: var(--primary);
            color: white;
            border: none;
            padding: 0 1.5rem;
            border-radius: 0.5rem;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:hover {
            opacity: 0.8;
        }
        button:disabled {
            background: var(--text-muted);
            cursor: not-allowed;
        }
        
        /* Progress UI */
        #progress-container {
            display: none;
            margin-top: 3rem;
            text-align: left;
            background: var(--surface);
            padding: 2rem;
            border-radius: 1rem;
            border: 1px solid var(--border);
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05);
        }
        .step {
            display: flex;
            align-items: center;
            margin-bottom: 1rem;
            font-size: 1rem;
            color: var(--text-muted);
            transition: color 0.3s;
        }
        .step:last-child { margin-bottom: 0; }
        .step.active { color: var(--text); font-weight: 500; }
        .step.done { color: var(--text); text-decoration: line-through; }
        .icon {
            width: 24px;
            height: 24px;
            margin-right: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        #result-action {
            display: none;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
            text-align: center;
        }
        .download-btn {
            position: static;
            display: inline-block;
            padding: 0.75rem 2rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>What do you want to build?</h1>
        <p>Prompt our AI agents and get a fully packaged app in seconds.</p>
        
        <div class="input-group">
            <input type="text" id="prompt-input" placeholder="e.g. A beautiful landing page for my bakery..." autocomplete="off" onkeypress="handleEnter(event)">
            <button id="generate-btn" onclick="startGeneration()">Generate</button>
        </div>

        <div id="progress-container">
            <div id="step-1" class="step"><div class="icon" id="icon-1">⏳</div> 🚀 Provisioning workspace...</div>
            <div id="step-2" class="step"><div class="icon" id="icon-2">⏳</div> 🧠 Planning architecture...</div>
            <div id="step-3" class="step"><div class="icon" id="icon-3">⏳</div> ✍️ Writing code...</div>
            <div id="step-4" class="step"><div class="icon" id="icon-4">⏳</div> 🕵️ Reviewing and testing...</div>
            <div id="step-5" class="step"><div class="icon" id="icon-5">⏳</div> 📦 Packaging final product...</div>
            
            <div id="result-action">
                <p style="color: #10b981; font-weight: 500; margin-bottom: 1rem;">🎉 Your app is ready!</p>
                <button class="download-btn" onclick="alert('Downloading your shiny new app!')">Download .zip</button>
            </div>
        </div>
    </div>

    <script>
        function handleEnter(e) {
            if (e.key === 'Enter') {
                startGeneration();
            }
        }

        async function startGeneration() {
            const input = document.getElementById('prompt-input');
            const btn = document.getElementById('generate-btn');
            if (!input.value.trim()) return;

            input.disabled = true;
            btn.disabled = true;
            btn.innerText = 'Building...';

            const container = document.getElementById('progress-container');
            container.style.display = 'block';
            document.getElementById('result-action').style.display = 'none';

            // Reset steps
            for (let i = 1; i <= 5; i++) {
                document.getElementById(`step-${i}`).className = 'step';
                document.getElementById(`icon-${i}`).innerHTML = '⏳';
            }

            // Simulate the backend pipeline
            await runStep(1, 1000); // Provisioning
            await runStep(2, 2000); // Planning
            await runStep(3, 3000); // Writing
            await runStep(4, 1500); // Reviewing
            await runStep(5, 1000); // Packaging

            document.getElementById('result-action').style.display = 'block';
            btn.innerText = 'Generate Another';
            btn.disabled = false;
            input.disabled = false;
            input.value = '';
        }

        async function runStep(stepNum, duration) {
            const stepEl = document.getElementById(`step-${stepNum}`);
            const iconEl = document.getElementById(`icon-${stepNum}`);
            
            stepEl.className = 'step active';
            iconEl.innerHTML = '<div class="spinner"></div>';
            
            await new Promise(r => setTimeout(r, duration));
            
            stepEl.className = 'step done';
            iconEl.innerHTML = '✅';
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Agent Orchestrator Demo</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --primary: #3b82f6;
            --success: #10b981;
            --danger: #ef4444;
            --text: #f8fafc;
            --text-muted: #94a3b8;
        }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            font-size: 2.5rem;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }
        .container {
            width: 100%;
            max-width: 900px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-top: 2rem;
        }
        .card {
            background: var(--surface);
            padding: 1.5rem;
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255,255,255,0.1);
        }
        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 0.5rem;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            margin-top: 1rem;
        }
        button:hover {
            transform: translateY(-2px);
            background: #2563eb;
        }
        button:active {
            transform: translateY(0);
        }
        .q-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }
        .q-table th, .q-table td {
            padding: 0.75rem;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .q-table th { color: var(--text-muted); font-weight: 500; }
        .log-entry {
            padding: 1rem;
            border-radius: 0.5rem;
            background: rgba(0,0,0,0.2);
            margin-bottom: 1rem;
            animation: slideIn 0.3s ease-out;
            border-left: 4px solid var(--primary);
        }
        .log-entry.success { border-color: var(--success); }
        .log-entry.failed { border-color: var(--danger); }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .ide-bar {
            height: 8px;
            background: var(--primary);
            border-radius: 4px;
            transition: width 0.3s ease, background 0.3s ease;
            min-width: 4px;
        }
        #logs { max-height: 400px; overflow-y: auto; }
    </style>
</head>
<body>
    <h1>Orchestrator AI</h1>
    <p style="color: var(--text-muted)">Reinforcement Learning in Action</p>
    <button onclick="triggerTask()" id="trigger-btn">Trigger Developer Task</button>

    <div class="container">
        <div class="card">
            <h2>🧠 The Brain (Q-Table)</h2>
            <p style="color: var(--text-muted); font-size: 0.9rem;">The agent learns which IDE performs best over time.</p>
            <table class="q-table">
                <thead>
                    <tr>
                        <th>Worker IDE</th>
                        <th>Score</th>
                        <th style="width:40%">Visual</th>
                    </tr>
                </thead>
                <tbody id="q-body">
                    <!-- Populated by JS -->
                </tbody>
            </table>
        </div>
        <div class="card">
            <h2>📜 Execution Logs</h2>
            <div id="logs">
                <div style="color: var(--text-muted)">Awaiting tasks...</div>
            </div>
        </div>
    </div>

    <script>
        // RL Agent logic (moved to frontend for standalone demo)
        const ides = ["cursor", "windsurf", "claude", "vscode_cline"];
        let qTable = { "cursor": 0.0, "windsurf": 0.0, "claude": 0.0, "vscode_cline": 0.0 };
        const epsilon = 0.2;
        const alpha = 0.1;
        let taskCounter = 0;

        function chooseIde() {
            let chosen;
            let explored;
            if (Math.random() < epsilon) {
                chosen = ides[Math.floor(Math.random() * ides.length)];
                explored = true;
            } else {
                let maxScore = -Infinity;
                for (const ide of ides) {
                    if (qTable[ide] > maxScore) {
                        maxScore = qTable[ide];
                        chosen = ide;
                    }
                }
                explored = false;
            }
            return { chosen, explored };
        }

        function updateQValue(ide, reward) {
            const currentQ = qTable[ide];
            const newQ = currentQ + alpha * (reward - currentQ);
            qTable[ide] = newQ;
            return { oldQ: currentQ, newQ: newQ };
        }

        function renderQTable() {
            const tbody = document.getElementById('q-body');
            tbody.innerHTML = '';
            
            const qValues = Object.values(qTable);
            const minQ = Math.min(...qValues, -1);
            const maxQ = Math.max(...qValues, 1);
            const range = maxQ - minQ;

            for (const ide of ides) {
                const score = qTable[ide];
                const widthPercent = ((score - minQ) / range) * 100;
                let color = 'var(--primary)';
                if(score > 0.05) color = 'var(--success)';
                else if(score < -0.05) color = 'var(--danger)';

                tbody.innerHTML += `
                    <tr>
                        <td style="font-weight: 500">${ide}</td>
                        <td>${score.toFixed(2)}</td>
                        <td><div class="ide-bar" style="width: ${Math.max(4, widthPercent)}%; background: ${color}"></div></td>
                    </tr>
                `;
            }
        }

        // Initial render
        renderQTable();

        async function triggerTask() {
            const btn = document.getElementById('trigger-btn');
            btn.style.opacity = '0.7';

            // Simulate slight network delay
            await new Promise(r => setTimeout(r, 200));

            taskCounter++;
            const taskId = 'task-' + String(taskCounter).padStart(3, '0');
            
            // RL Pipeline
            const { chosen, explored } = chooseIde();
            const success = Math.random() < 0.66; // 66% chance of success
            const reward = success ? 1.0 : -1.0;
            const { oldQ, newQ } = updateQValue(chosen, reward);
            
            // Update Logs
            const logs = document.getElementById('logs');
            if(logs.innerHTML.includes('Awaiting tasks')) logs.innerHTML = '';
            
            const logEntry = document.createElement('div');
            logEntry.className = `log-entry ${success ? 'success' : 'failed'}`;
            
            const strategy = explored ? 'EXPLORED (Random)' : 'EXPLOITED (Best Known)';
            const statusStr = success ? '✅ SUCCESS' : '❌ FAILED';
            
            logEntry.innerHTML = `
                <div style="font-weight: 600; margin-bottom: 0.5rem">Task: ${taskId}</div>
                <div style="font-size: 0.9rem; color: var(--text-muted)">
                    <div>Router: ${strategy} &rarr; <b style="color:var(--text)">${chosen}</b></div>
                    <div style="margin: 0.5rem 0">${statusStr}</div>
                    <div>Q-Score: ${oldQ.toFixed(2)} &rarr; <b style="color:var(--text)">${newQ.toFixed(2)}</b></div>
                </div>
            `;
            logs.prepend(logEntry);

            // Update Q-Table
            renderQTable();

            setTimeout(() => { btn.style.opacity = '1'; }, 200);
        }
    </script>
</body>
</html>
